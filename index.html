<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game of Evolution</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <h1>🧬 Game of Evolution</h1>
      </div>
      <div class="header-right">
        <span id="node-count-hint" class="hint"></span>
        <button id="btn-randomize" class="btn btn-secondary">↺ Randomize</button>
        <button id="btn-run" class="btn btn-primary">▶ Run</button>
      </div>
    </header>

    <main id="app-main">
      <!-- Left panel: controls -->
      <aside id="panel-controls">
        <section class="control-section">
          <h2>Simulation</h2>

          <label class="control-row">
            <span class="label-text">Generations</span>
            <input type="range" id="ctrl-generations" min="1" max="10" value="5" />
            <span class="value-display" id="val-generations">5</span>
          </label>

          <label class="control-row">
            <span class="label-text">Branching factor</span>
            <input type="range" id="ctrl-branching" min="1" max="4" value="2" />
            <span class="value-display" id="val-branching">2</span>
          </label>

          <label class="control-row">
            <span class="label-text">Mutation rate</span>
            <input type="range" id="ctrl-mutation" min="1" max="100" value="51" />
            <span class="value-display" id="val-mutation">1.0%</span>
          </label>
        </section>

        <!-- Selection panel injected here by selectionPanel.js -->
        <div id="selection-panel-mount"></div>
      </aside>

      <!-- Center panel: evolutionary tree -->
      <section id="panel-tree">
        <div id="tree-container">
          <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="node-clip">
                <circle r="28" />
              </clipPath>
            </defs>
            <g id="tree-root-group">
              <g id="tree-edges"></g>
              <g id="tree-nodes"></g>
            </g>
          </svg>
          <div id="tree-empty-msg">
            <p>Configure parameters and click <strong>▶ Run</strong> to begin.</p>
          </div>
        </div>
        <!-- Predator tree (shown when predator mode active) -->
        <div id="predator-tree-container" class="hidden">
          <div class="tree-label predator-label">Predator lineage</div>
          <svg id="predator-tree-svg" xmlns="http://www.w3.org/2000/svg">
            <g id="predator-root-group">
              <g id="predator-edges"></g>
              <g id="predator-nodes"></g>
            </g>
          </svg>
        </div>
      </section>

      <!-- Right panel: creature detail -->
      <aside id="panel-creature">
        <div id="creature-detail-empty">
          <p>Click a creature in the tree to inspect it.</p>
        </div>
        <div id="creature-detail" class="hidden">
          <canvas id="creature-canvas" width="320" height="390"></canvas>
          <div id="creature-meta">
            <div class="meta-row">
              <span class="meta-label">Generation</span>
              <span id="meta-generation">—</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Fitness</span>
              <span id="meta-fitness">—</span>
            </div>
            <div class="meta-row fitness-bar-row">
              <div id="fitness-bar-track">
                <div id="fitness-bar-fill"></div>
              </div>
            </div>
          </div>
          <div id="genome-display">
            <h3>Genome</h3>
            <div id="genome-parts"></div>
          </div>
          <div id="creature-nav">
            <button id="btn-goto-parent" class="btn btn-secondary btn-sm">↑ Parent</button>
            <button id="btn-set-target" class="btn btn-ghost btn-sm">🎯 Set as target</button>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
